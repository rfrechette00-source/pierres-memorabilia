<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pierre's Memorabilia | Catalog</title>
    <style>
        /* 1. Main Wrapper - Sets the Grid for the Catalog */
        .catalog-container {
            display: grid;
            grid-template-columns: 1fr; /* Forces 1 single column on mobile */
            gap: 25px; /* Space between cards */
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
            background-color: #f4f4f4;
        }

        /* 2. Breakpoint for Desktop - Switches to 3 columns */
        @media (min-width: 768px) {
            .catalog-container {
                grid-template-columns: repeat(3, 1fr); /* 3 equal-width columns */
            }
        }

        /* 3. Individual Card Styling */
        .card {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%; /* Ensures equal height in rows */
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            box-sizing: border-box;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* 4. Image Fix - Prevents Squishing */
        .card-thumb {
            width: 100%;
            aspect-ratio: 1 / 1; /* Maintains square shape */
            overflow: hidden;
            background-color: #eee;
        }

        .card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Crops to fit without distortion */
            display: block;
        }

        /* 5. Fix alignment for info and text */
        .card-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1; /* Fills remaining space */
            text-align: left;
        }

        .card-info h3 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            color: #333;
        }

        .card-info p {
            margin: auto 0 0 0; /* Pushes price/details to the bottom */
            font-weight: bold;
            color: #d9534f; /* Example accent color for price */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: #222;
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <h1>Pierre's Memorabilia</h1>
        <p>Curated collectibles for the true enthusiast.</p>
    </header>

    <main class="catalog-container">

        <div class="card">
            <div class="card-thumb">
                <img src="https://via.placeholder.com/400" alt="Memorabilia Item 1">
            </div>
            <div class="card-info">
                <h3>Signed Baseball (1954)</h3>
                <p>$450.00</p>
            </div>
        </div>

        <div class="card">
            <div class="card-thumb">
                <img src="https://via.placeholder.com/400" alt="Memorabilia Item 2">
            </div>
            <div class="card-info">
                <h3>Vintage Jersey</h3>
                <p>$1,200.00</p>
            </div>
        </div>

        <div class="card">
            <div class="card-thumb">
                <img src="https://via.placeholder.com/400" alt="Memorabilia Item 3">
            </div>
            <div class="card-info">
                <h3>Championship Ring Replica</h3>
                <p>$85.00</p>
            </div>
        </div>

        <div class="card">
            <div class="card-thumb">
                <img src="https://via.placeholder.com/400" alt="Memorabilia Item 4">
            </div>
            <div class="card-info">
                <h3>Autographed Photo</h3>
                <p>$150.00</p>
            </div>
        </div>

    </main>

</body>
</html>
